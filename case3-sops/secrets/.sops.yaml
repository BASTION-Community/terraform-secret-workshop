# ── SOPS 설정 ──────────────────────────────────────────────
# secrets/ 디렉토리의 YAML 파일을 암호화할 때 사용할 KMS 키
# KMS Key를 먼저 terraform apply로 생성한 뒤, 아래 ARN을 실제 값으로 교체한다
#
# 사용법:
#   1. terraform apply (kms.tf) → KMS ARN 획득
#   2. 아래 kms 필드에 실제 ARN 입력
#   3. sops secrets/demo.yaml 으로 편집

creation_rules:
  - path_regex: .*\.yaml$
    kms: "arn:aws:kms:ap-northeast-2:ACCOUNT_ID:key/KEY_ID"  # ← 실제 KMS ARN으로 교체
